
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: justice-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: backend-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --bind 0.0.0.0
    networks:
      - app-network

  backend:
    build: .
    container_name: court-backend
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      # Database connection settings
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
      
      # Redis connection settings
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-1}
      REDIS_URL: redis://${REDIS_HOST}:${REDIS_PORT:-6379}/${REDIS_DB:-1}
      
      # Cache settings
      CACHE_URL: redis://${REDIS_HOST}:${REDIS_PORT:-6379}/${REDIS_DB:-1}
      
      # Django settings
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      
      # Optional: Celery settings (if you're using Celery)
      CELERY_BROKER_URL: redis://${REDIS_HOST}:${REDIS_PORT:-6379}/0
      CELERY_RESULT_BACKEND: redis://${REDIS_HOST}:${REDIS_PORT:-6379}/0
      
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python -m gunicorn backend.wsgi:application --bind 0.0.0.0:8000"
    restart: unless-stopped
    networks:
      - app-network

  # Optional: Redis Commander for Redis management UI (useful for development)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: test-redis-commander
    environment:
      - REDIS_HOSTS=local:${REDIS_HOST}:${REDIS_PORT:-6379}
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge